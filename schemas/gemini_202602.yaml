$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://jsonschemaprofiles.unitvectorylabs.com/schemas/gemini_202602.yaml"
title: "Gemini Structured Output Profile (baseline 202602)"
description: >
  Meta-schema for JSON Schemas intended for Gemini structured output, based on
  the documented JSON Schema support baseline for 2026-02.
$comment: >
  This profile is intentionally conservative and allows only the keyword subset
  explicitly documented in Google's JSON Schema support section.

$ref: "#/$defs/geminiSchema"

$defs:
  primitiveValue:
    type:
      - string
      - number
      - integer
      - boolean
      - "null"

  baseType:
    enum:
      - string
      - integer
      - number
      - boolean
      - array
      - object
      - "null"

  typeOrNullable:
    anyOf:
      - $ref: "#/$defs/baseType"
      - type: array
        minItems: 2
        maxItems: 2
        uniqueItems: true
        items:
          enum:
            - string
            - integer
            - number
            - boolean
            - array
            - object
            - "null"
        contains:
          const: "null"

  requiredList:
    type: array
    uniqueItems: true
    items:
      type: string

  propertyMap:
    type: object
    additionalProperties:
      $ref: "#/$defs/geminiSchema"

  additionalPropertiesValue:
    anyOf:
      - type: boolean
      - $ref: "#/$defs/geminiSchema"

  geminiSchema:
    type: object
    additionalProperties: false
    required:
      - type
    properties:
      type:
        $ref: "#/$defs/typeOrNullable"
      title:
        type: string
      description:
        type: string
      enum:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/primitiveValue"
      format:
        enum:
          - date-time
          - date
          - time
      minimum:
        type: number
      maximum:
        type: number
      properties:
        $ref: "#/$defs/propertyMap"
      required:
        $ref: "#/$defs/requiredList"
      propertyOrdering:
        type: array
        uniqueItems: true
        items:
          type: string
      additionalProperties:
        $ref: "#/$defs/additionalPropertiesValue"
      items:
        $ref: "#/$defs/geminiSchema"
      prefixItems:
        type: array
        items:
          $ref: "#/$defs/geminiSchema"
      minItems:
        type: integer
        minimum: 0
      maxItems:
        type: integer
        minimum: 0
    dependentRequired:
      required:
        - properties
    allOf:
      - if:
          properties:
            type:
              anyOf:
                - const: array
                - type: array
                  contains:
                    const: array
          required:
            - type
        then:
          anyOf:
            - required:
                - items
            - required:
                - prefixItems
