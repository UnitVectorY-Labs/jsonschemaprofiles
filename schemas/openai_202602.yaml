$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://jsonschemaprofiles.unitvectorylabs.com/schemas/openai_202602.yaml"
title: "OpenAI Structured Outputs Profile (baseline 202602)"
description: >
  Meta-schema for JSON Schemas intended for OpenAI Structured Outputs, based on
  the documented supported-schemas subset baseline for 2026-02.
$comment: >
  This profile enforces the keyword subset and structural rules that are
  expressible in JSON Schema. Published runtime limits (for example max total
  properties, schema string-size budgets, and model-specific support gaps) must
  be validated separately.

type: object
additionalProperties: false
required:
  - type
  - properties
  - required
  - additionalProperties
properties:
  type:
    const: object
  title:
    type: string
  description:
    type: string
  properties:
    $ref: "#/$defs/propertyMap"
  required:
    $ref: "#/$defs/requiredList"
  additionalProperties:
    const: false
  $defs:
    type: object
    additionalProperties:
      $ref: "#/$defs/openaiSchema"
  $ref:
    $ref: "#/$defs/ref"

$defs:
  primitiveValue:
    type:
      - string
      - number
      - integer
      - boolean
      - "null"

  nonNullType:
    enum:
      - string
      - number
      - integer
      - boolean
      - object
      - array

  typeOrNullable:
    anyOf:
      - $ref: "#/$defs/nonNullType"
      - type: array
        minItems: 2
        maxItems: 2
        uniqueItems: true
        items:
          enum:
            - string
            - number
            - integer
            - boolean
            - object
            - array
            - "null"
        contains:
          const: "null"

  requiredList:
    type: array
    uniqueItems: true
    items:
      type: string

  ref:
    type: string
    pattern: "^#(?:/.+)?$"

  propertyMap:
    type: object
    additionalProperties:
      $ref: "#/$defs/openaiSchema"

  openaiSchema:
    type: object
    additionalProperties: false
    properties:
      type:
        $ref: "#/$defs/typeOrNullable"
      title:
        type: string
      description:
        type: string
      enum:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/primitiveValue"
      const:
        $ref: "#/$defs/primitiveValue"
      properties:
        $ref: "#/$defs/propertyMap"
      required:
        $ref: "#/$defs/requiredList"
      additionalProperties:
        const: false
      items:
        $ref: "#/$defs/openaiSchema"
      anyOf:
        type: array
        minItems: 2
        items:
          $ref: "#/$defs/openaiSchema"
      $defs:
        type: object
        additionalProperties:
          $ref: "#/$defs/openaiSchema"
      $ref:
        $ref: "#/$defs/ref"
      pattern:
        type: string
      format:
        enum:
          - date-time
          - time
          - date
          - duration
          - email
          - hostname
          - ipv4
          - ipv6
          - uuid
      multipleOf:
        type: number
        exclusiveMinimum: 0
      maximum:
        type: number
      exclusiveMaximum:
        type: number
      minimum:
        type: number
      exclusiveMinimum:
        type: number
      minItems:
        type: integer
        minimum: 0
      maxItems:
        type: integer
        minimum: 0
    anyOf:
      - required:
          - $ref
      - required:
          - type
      - required:
          - anyOf
    allOf:
      - if:
          properties:
            type:
              anyOf:
                - const: object
                - type: array
                  contains:
                    const: object
          required:
            - type
        then:
          required:
            - properties
            - required
            - additionalProperties
      - if:
          properties:
            type:
              anyOf:
                - const: array
                - type: array
                  contains:
                    const: array
          required:
            - type
        then:
          required:
            - items
